<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShieldMe</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>ShieldMe</h1>
        <p>Protect Yourself from Phishing Attacks</p>
    </header>

    <main>

        <section class="checker">

            <h2>Check a Link</h2>

            <input
                type="text"
                id="linkInput"
                placeholder="Paste a website link here">

            <button onclick="checkLink()">
                Check Link
            </button>

            <p id="result"></p>

        </section>

    </main>

    <script src="script.js"></script>

</body>

</html>
